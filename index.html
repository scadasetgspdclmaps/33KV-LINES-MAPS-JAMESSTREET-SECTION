<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TGSPDCL — 33KV James Street GIS</title>
<style>
body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0d1b2a;font-family:'Segoe UI',sans-serif}
#tg-loader{position:fixed;inset:0;z-index:99999;background:#0d1b2a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.tg-ld-logo{font-size:22px;color:#00c8ff;letter-spacing:4px;font-family:monospace}
.tg-ld-sub{font-size:12px;color:rgba(176,204,224,.4);letter-spacing:2px}
.tg-ld-bar{width:200px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.tg-ld-fill{height:100%;width:0;background:linear-gradient(90deg,#00c8ff,#0077ff);border-radius:2px;transition:width .3s}
#tg-frame{position:fixed;inset:48px 0 36px 0;border:none;width:100%;height:calc(100% - 84px)}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="tg-loader">
  <div class="tg-ld-logo">TGSPDCL</div>
  <div class="tg-ld-sub">JAMES STREET · 33KV · LOADING MAP DATA...</div>
  <div class="tg-ld-bar"><div class="tg-ld-fill" id="tg-fill"></div></div>
</div>

<!-- Will be injected after load -->
<div id="tg-ui-wrap"></div>

<script>
// ─── Animate loader bar ───────────────────────────────────
var pct = 0;
var fillEl = document.getElementById('tg-fill');
var barIv = setInterval(function(){
  pct += Math.random()*12 + 5;
  if(pct >= 90){ pct = 90; clearInterval(barIv); }
  fillEl.style.width = pct + '%';
}, 120);

// ─── Fetch the original QGIS map and inject into iframe ──
fetch('https://raw.githubusercontent.com/scadasetgspdclmaps/33KV-LINES-MAPS-JAMESSTREET-SECTION/b62b1797/index.html')
  .then(function(r){ return r.text(); })
  .then(function(html){
    // Patch the original HTML so its #map fills correctly
    var patched = html.replace(
      'html, body, #map {',
      'html, body, #map { top:0!important; bottom:0!important; left:0!important; right:0!important; position:fixed!important; '
    );

    // Create iframe with the original map
    var iframe = document.createElement('iframe');
    iframe.id = 'tg-frame';
    iframe.style.cssText = 'position:fixed;inset:48px 0 36px 0;border:none;width:100%;height:calc(100% - 84px);';
    document.body.appendChild(iframe);

    // Write original map into iframe
    var doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open(); doc.write(patched); doc.close();

    // Finish loader
    pct = 100; fillEl.style.width = '100%';
    setTimeout(function(){
      var loader = document.getElementById('tg-loader');
      loader.style.opacity = '0';
      loader.style.transition = 'opacity .5s';
      setTimeout(function(){ loader.remove(); }, 500);
    }, 600);

    // Inject enhanced UI
    injectUI(iframe);
  })
  .catch(function(err){
    document.getElementById('tg-loader').innerHTML =
      '<div style="color:#ff1744;font-family:monospace;font-size:13px">Error loading map: ' + err.message + '</div>';
  });

function injectUI(iframe) {
  // ── TOP BAR ──────────────────────────────────────────
  var topbar = document.createElement('div');
  topbar.id = 'tg-topbar';
  topbar.style.cssText = [
    'position:fixed;top:0;left:0;right:0;z-index:10000;height:48px',
    'background:linear-gradient(135deg,#0a1520f2,#0f2236f2)',
    'backdrop-filter:blur(18px)',
    'border-bottom:1px solid rgba(0,200,255,0.18)',
    'display:flex;align-items:center;padding:0 14px;gap:12px',
    'box-shadow:0 2px 20px rgba(0,0,0,.5)',
    'font-family:Rajdhani,Segoe UI,sans-serif'
  ].join(';');
  topbar.innerHTML = [
    '<span style="font-family:monospace;font-size:13px;color:#00c8ff;letter-spacing:2px">TGSPDCL</span>',
    '<span style="width:1px;height:26px;background:rgba(0,200,255,0.18)"></span>',
    '<span style="font-size:13px;font-weight:600;color:#b0cce0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">James Street Circle — 33KV Distribution GIS</span>',
    '<div style="position:relative;flex-shrink:0">',
      '<input id="tg-srch" placeholder="Search pole, feeder, substation…" autocomplete="off" style="background:rgba(255,255,255,.06);border:1px solid rgba(0,200,255,0.18);border-radius:20px;padding:5px 13px 5px 30px;color:#b0cce0;font-size:12px;width:190px;outline:none;transition:all .3s"/>',
      '<span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:rgba(176,204,224,.4);font-size:13px;pointer-events:none">⌕</span>',
    '</div>',
    '<div id="tg-chip" style="font-family:monospace;font-size:9px;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;border:1px solid rgba(0,230,118,.35);background:rgba(0,230,118,.08);color:#00e676;white-space:nowrap">● LIVE</div>',
    '<button onclick="tgTogglePanel()" style="background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.25);border-radius:8px;color:#00c8ff;font-size:12px;padding:4px 10px;cursor:pointer">⚙ Panel</button>'
  ].join('');
  document.body.appendChild(topbar);

  // ── LEFT PANEL ───────────────────────────────────────
  var panel = document.createElement('div');
  panel.id = 'tg-panel';
  panel.style.cssText = [
    'position:fixed;top:48px;left:0;bottom:36px;z-index:9998;width:220px',
    'background:linear-gradient(180deg,#0a1828f8,#0d1f33f8)',
    'backdrop-filter:blur(22px)',
    'border-right:1px solid rgba(0,200,255,0.18)',
    'display:flex;flex-direction:column',
    'transform:translateX(0);transition:transform .32s',
    'box-shadow:4px 0 28px rgba(0,0,0,.4)',
    'overflow-y:auto;font-family:Segoe UI,sans-serif'
  ].join(';');

  panel.innerHTML = [
    // Basemap section
    '<div style="padding:11px 13px 8px;border-bottom:1px solid rgba(0,200,255,.07)">',
      '<div style="font-family:monospace;font-size:9px;color:rgba(0,200,255,.55);letter-spacing:2px;margin-bottom:8px">// BASEMAP</div>',
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">',
        '<div class="tg-bm tg-bm-act" id="tg-bm-dark" onclick="tgBM('dark')" style="background:rgba(0,200,255,.15);border:1px solid #00c8ff;border-radius:7px;padding:7px 4px;cursor:pointer;text-align:center;font-size:11px;color:#00c8ff;font-weight:600"><span style="font-size:17px;display:block;margin-bottom:2px">🌑</span>Dark</div>',
        '<div class="tg-bm" id="tg-bm-satellite" onclick="tgBM('satellite')" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:7px;padding:7px 4px;cursor:pointer;text-align:center;font-size:11px;color:#b0cce0"><span style="font-size:17px;display:block;margin-bottom:2px">🛰️</span>Satellite</div>',
        '<div class="tg-bm" id="tg-bm-street" onclick="tgBM('street')" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:7px;padding:7px 4px;cursor:pointer;text-align:center;font-size:11px;color:#b0cce0"><span style="font-size:17px;display:block;margin-bottom:2px">🗺️</span>Street</div>',
        '<div class="tg-bm" id="tg-bm-hybrid" onclick="tgBM('hybrid')" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:7px;padding:7px 4px;cursor:pointer;text-align:center;font-size:11px;color:#b0cce0"><span style="font-size:17px;display:block;margin-bottom:2px">🏙️</span>Hybrid</div>',
      '</div>',
    '</div>',
    // Simulate section
    '<div style="padding:11px 13px 8px;border-bottom:1px solid rgba(0,200,255,.07)">',
      '<div style="font-family:monospace;font-size:9px;color:rgba(0,200,255,.55);letter-spacing:2px;margin-bottom:8px">// SIMULATE STATUS</div>',
      '<div style="display:flex;gap:5px">',
        '<button onclick="tgSim('live')" style="flex:1;padding:7px 3px;border-radius:7px;cursor:pointer;font-family:monospace;font-size:9px;border:1px solid rgba(0,230,118,.4);background:rgba(0,230,118,.08);color:#00e676">⚡ LIVE</button>',
        '<button onclick="tgSim('trip')" style="flex:1;padding:7px 3px;border-radius:7px;cursor:pointer;font-family:monospace;font-size:9px;border:1px solid rgba(255,171,0,.4);background:rgba(255,171,0,.08);color:#ffab00">⚠ TRIP</button>',
        '<button onclick="tgSim('fault')" style="flex:1;padding:7px 3px;border-radius:7px;cursor:pointer;font-family:monospace;font-size:9px;border:1px solid rgba(255,23,68,.4);background:rgba(255,23,68,.08);color:#ff1744">✕ FAULT</button>',
      '</div>',
    '</div>',
    // Info section
    '<div style="padding:11px 13px 8px;margin-top:auto">',
      '<div style="font-family:monospace;font-size:9px;color:rgba(0,200,255,.55);letter-spacing:2px;margin-bottom:8px">// SECTION INFO</div>',
      '<div style="font-family:monospace;font-size:9px;color:rgba(176,204,224,.4);line-height:1.9">SECTION: JAMES STREET<br>DIVISION: SECUNDERABAD<br>SUB-DIV: NEHRU NAGAR<br>VOLTAGE: 33KV / 11KV</div>',
    '</div>'
  ].join('');
  document.body.appendChild(panel);

  // ── BOTTOM BAR ───────────────────────────────────────
  var botbar = document.createElement('div');
  botbar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9997;height:36px;background:rgba(9,22,37,.92);backdrop-filter:blur(12px);border-top:1px solid rgba(0,200,255,0.18);display:flex;align-items:center;padding:0 13px;gap:16px;font-family:monospace;font-size:10px;color:rgba(176,204,224,.35)';
  botbar.innerHTML = '<span>LAT/LNG: <span id="tg-coords" style="color:#00c8ff">—</span></span><span>ZOOM: <span id="tg-zoom" style="color:#00c8ff">—</span></span><span style="margin-left:auto;opacity:.3">JAMES STREET · 33KV · TGSPDCL SCADA SECTION</span>';
  document.body.appendChild(botbar);

  // ── TOAST ────────────────────────────────────────────
  var toast = document.createElement('div');
  toast.id = 'tg-toast';
  toast.style.cssText = 'position:fixed;top:58px;left:50%;z-index:11000;transform:translateX(-50%) translateY(-12px);background:rgba(13,27,42,.95);border:1px solid rgba(0,200,255,0.18);border-radius:10px;padding:8px 16px;font-size:12px;color:#b0cce0;backdrop-filter:blur(16px);opacity:0;pointer-events:none;transition:all .28s;white-space:nowrap';
  document.body.appendChild(toast);

  // ── FUNCTIONS ────────────────────────────────────────
  var _panelOpen = true;
  window.tgTogglePanel = function(){
    _panelOpen = !_panelOpen;
    document.getElementById('tg-panel').style.transform = _panelOpen ? 'translateX(0)' : 'translateX(-220px)';
  };

  var _curBM = 'dark';
  var _BM = {
    dark: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    street: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    hybrid: 'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}'
  };
  window.tgBM = function(name){
    var iwin = document.getElementById('tg-frame').contentWindow;
    var L = iwin.L; var map = iwin.map;
    if(!L || !map){ tgShowToast('Map not ready yet'); return; }
    // Remove old basemap
    if(window._tgBaselayer){ try{ map.removeLayer(window._tgBaselayer); }catch(e){} }
    // Remove original basemap
    map.eachLayer(function(l){
      if(l._url && (l._url.includes('googleapis') || l._url.includes('openstreetmap') || l._url.includes('cartocdn') || l._url.includes('arcgisonline') || l._url.includes('google.com/maps')))
        map.removeLayer(l);
    });
    window._tgBaselayer = L.tileLayer(_BM[name], {maxZoom:22, subdomains: name==='dark'?'abcd':'abc', attribution:''});
    window._tgBaselayer.addTo(map);
    window._tgBaselayer.bringToBack();
    _curBM = name;
    document.querySelectorAll('.tg-bm').forEach(function(b){
      b.style.background = 'rgba(255,255,255,.04)';
      b.style.borderColor = 'rgba(255,255,255,.09)';
      b.style.color = '#b0cce0';
      b.style.fontWeight = 'normal';
    });
    var btn = document.getElementById('tg-bm-'+name);
    btn.style.background = 'rgba(0,200,255,.15)';
    btn.style.borderColor = '#00c8ff';
    btn.style.color = '#00c8ff';
    btn.style.fontWeight = '600';
    tgShowToast(name.charAt(0).toUpperCase()+name.slice(1)+' basemap');
  };

  // Apply dark basemap after iframe loads
  document.getElementById('tg-frame').addEventListener('load', function(){
    setTimeout(function(){
      tgBM('dark');
      // Hook coords display
      var iwin = document.getElementById('tg-frame').contentWindow;
      if(iwin.map){
        iwin.map.on('mousemove', function(e){
          var c = document.getElementById('tg-coords');
          if(c) c.textContent = e.latlng.lat.toFixed(5)+', '+e.latlng.lng.toFixed(5);
        });
        iwin.map.on('zoomend', function(){
          var z = document.getElementById('tg-zoom');
          if(z) z.textContent = iwin.map.getZoom();
        });
        var z = document.getElementById('tg-zoom');
        if(z) z.textContent = iwin.map.getZoom();
      }
    }, 1000);
  });

  var _blinkIvs = [];
  window.tgSim = function(s){
    _blinkIvs.forEach(function(iv){ clearInterval(iv); }); _blinkIvs = [];
    var chip = document.getElementById('tg-chip');
    var iwin = document.getElementById('tg-frame').contentWindow;
    if(s==='live'){
      chip.style.cssText = 'font-family:monospace;font-size:9px;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;border:1px solid rgba(0,230,118,.35);background:rgba(0,230,118,.08);color:#00e676;white-space:nowrap';
      chip.textContent = '● LIVE';
      if(iwin.map) iwin.map.eachLayer(function(l){ if(l.setStyle&&l._path){try{l.setStyle({opacity:.9,weight:3});}catch(e){}} });
      tgShowToast('All feeders energised — normal operation');
    } else if(s==='trip'){
      chip.style.cssText = 'font-family:monospace;font-size:9px;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,171,0,.4);background:rgba(255,171,0,.1);color:#ffab00;white-space:nowrap';
      chip.textContent = '⚠ TRIPPING';
      tgShowToast('⚠ Tripping detected — check relay');
      if(iwin.map) iwin.map.eachLayer(function(l){
        if(l.setStyle&&l._path){ var v=true; var iv=setInterval(function(){try{l.setStyle({color:v?'#ffab00':'#ff6600',opacity:v?1:.1});v=!v;}catch(e){clearInterval(iv);}},220); _blinkIvs.push(iv); }
      });
    } else if(s==='fault'){
      chip.style.cssText = 'font-family:monospace;font-size:9px;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,23,68,.4);background:rgba(255,23,68,.1);color:#ff1744;white-space:nowrap';
      chip.textContent = '✕ FAULT';
      tgShowToast('✕ FAULT — cable breakdown! Dispatch crew immediately');
      if(iwin.map) iwin.map.eachLayer(function(l){
        if(l.setStyle&&l._path){ var v=true; var iv=setInterval(function(){try{l.setStyle({color:v?'#ff1744':'#8b0000',opacity:v?1:.05,weight:v?6:3});v=!v;}catch(e){clearInterval(iv);}},350); _blinkIvs.push(iv); }
      });
    }
  };

  // Search
  document.getElementById('tg-srch').addEventListener('input', function(e){
    var q = e.target.value.toLowerCase().trim();
    if(!q || q.length < 2) return;
    var iwin = document.getElementById('tg-frame').contentWindow;
    var allVars = Object.keys(iwin).filter(function(k){ return k.startsWith('json_'); });
    for(var i=0; i<allVars.length; i++){
      var d = iwin[allVars[i]]; if(!d||!d.features) continue;
      var feat = d.features.find(function(f){
        var p = f.properties||{};
        return (p['Pole Number']+'').toLowerCase().includes(q)
          || (p['Feeder Name']||'').toLowerCase().includes(q)
          || (p['Name of the Substation']||'').toLowerCase().includes(q)
          || (p['Section']||'').toLowerCase().includes(q)
          || (p['EHT SS CODE - EHT SS NAME']||'').toLowerCase().includes(q);
      });
      if(feat && feat.geometry && feat.geometry.type==='Point'){
        var ll = [feat.geometry.coordinates[1], feat.geometry.coordinates[0]];
        if(iwin.map) iwin.map.flyTo(ll, 18, {animate:true, duration:0.7});
        tgShowToast('Found: '+(feat.properties['Feeder Name']||feat.properties['Name of the Substation']||q));
        return;
      }
    }
    tgShowToast('No results for: '+q);
  });
  document.getElementById('tg-srch').addEventListener('keydown', function(e){
    if(e.key==='Escape'){e.target.value='';e.target.blur();}
  });

  var _tt;
  window.tgShowToast = function(msg){
    var t = document.getElementById('tg-toast');
    t.textContent = msg; t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(_tt); _tt = setTimeout(function(){ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(-12px)'; }, 2200);
  };
}
</script>
</body>
</html>
